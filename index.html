<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KisanVoice</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Noto+Sans+Malayalam:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --soil:    #1a1208;
    --earth:   #2d1f0a;
    --bark:    #3d2b10;
    --moss:    #4a7c3f;
    --leaf:    #6aab5a;
    --sprout:  #9fd48a;
    --mist:    #c8e8c0;
    --sun:     #e8c84a;
    --cream:   #f5efe0;
    --dew:     rgba(154,212,138,0.12);
    --glow:    rgba(106,171,90,0.25);
    --radius:  18px;
    --font:    'Sora', sans-serif;
    --font-ml: 'Noto Sans Malayalam', 'Sora', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--soil);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Organic background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(74,124,63,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(45,31,10,0.8) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 50% 50%, rgba(26,18,8,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 16px 120px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 28px 4px 20px;
  }

  .logo-mark {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--moss), var(--leaf));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 16px var(--glow);
  }

  .header-text h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: -0.3px;
  }

  .header-text p {
    font-size: 11px;
    color: var(--sprout);
    font-weight: 300;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .lang-toggle {
    margin-left: auto;
    display: flex;
    background: var(--earth);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
    border: 1px solid rgba(106,171,90,0.2);
  }

  .lang-btn {
    padding: 4px 12px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: rgba(245,239,224,0.5);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .lang-btn.active {
    background: var(--moss);
    color: var(--cream);
    box-shadow: 0 2px 8px var(--glow);
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 8px 0;
    overflow-y: auto;
    scrollbar-width: none;
  }

  .chat-area::-webkit-scrollbar { display: none; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 60px 20px;
    text-align: center;
  }

  .empty-orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--leaf), var(--moss));
    box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(106,171,90,0.1);
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(106,171,90,0.1); }
    50% { transform: scale(1.06); box-shadow: 0 0 60px var(--glow), 0 0 100px rgba(106,171,90,0.15); }
  }

  .empty-state h2 {
    font-size: 20px;
    font-weight: 500;
    color: var(--cream);
    line-height: 1.4;
  }

  .empty-state p {
    font-size: 13px;
    color: rgba(245,239,224,0.45);
    line-height: 1.6;
    max-width: 260px;
    font-weight: 300;
  }

  /* Message bubbles */
  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msgIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
    transform: translateY(12px);
  }

  @keyframes msgIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .message.farmer { align-items: flex-end; }
  .message.ai     { align-items: flex-start; }

  .bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: var(--radius);
    position: relative;
    line-height: 1.55;
  }

  .message.farmer .bubble {
    background: linear-gradient(135deg, var(--moss), #3d6e33);
    color: var(--cream);
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 20px rgba(74,124,63,0.3);
  }

  .message.ai .bubble {
    background: var(--earth);
    border: 1px solid rgba(106,171,90,0.18);
    color: var(--cream);
    border-bottom-left-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  /* Voice message bubble */
  .voice-bubble {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
  }

  .play-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.15);
    color: var(--cream);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
    font-size: 12px;
  }

  .play-btn:hover { background: rgba(255,255,255,0.25); }

  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
  }

  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: rgba(245,239,224,0.5);
    transition: height 0.1s;
  }

  .message.farmer .wave-bar { background: rgba(245,239,224,0.6); }
  .message.ai     .wave-bar { background: rgba(106,171,90,0.6); }

  .voice-duration {
    font-size: 11px;
    color: rgba(245,239,224,0.5);
    flex-shrink: 0;
    font-weight: 300;
  }

  .transcript-text {
    font-size: 13px;
    font-weight: 300;
    color: rgba(245,239,224,0.7);
    padding: 0 16px 10px;
    font-style: italic;
    max-width: 82%;
  }

  .message.farmer .transcript-text { align-self: flex-end; text-align: right; }

  .msg-time {
    font-size: 10px;
    color: rgba(245,239,224,0.3);
    padding: 0 4px;
    font-weight: 300;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    animation: msgIn 0.3s forwards;
    opacity: 0;
  }

  .ai-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--moss), var(--leaf));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .typing-dots {
    background: var(--earth);
    border: 1px solid rgba(106,171,90,0.18);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--leaf);
    animation: dotPulse 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Bottom controls */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 520px;
    padding: 16px 16px 32px;
    background: linear-gradient(to top, var(--soil) 60%, transparent);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .status-pill {
    font-size: 11px;
    color: rgba(245,239,224,0.4);
    background: rgba(45,31,10,0.8);
    border: 1px solid rgba(106,171,90,0.15);
    border-radius: 20px;
    padding: 5px 14px;
    letter-spacing: 0.3px;
    font-weight: 300;
    min-height: 24px;
    transition: all 0.3s;
  }

  .status-pill.active {
    color: var(--sprout);
    border-color: rgba(106,171,90,0.4);
    background: rgba(74,124,63,0.15);
  }

  /* The mic button */
  .mic-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mic-ring {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--leaf);
    opacity: 0;
    animation: none;
  }

  .mic-ring.pulse {
    animation: ringPulse 1.5s ease-out infinite;
  }

  .mic-ring:nth-child(2) { animation-delay: 0.5s; }

  @keyframes ringPulse {
    0%   { transform: scale(1);    opacity: 0.6; }
    100% { transform: scale(1.8);  opacity: 0; }
  }

  .mic-btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--moss), var(--leaf));
    color: var(--cream);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 24px var(--glow), 0 2px 8px rgba(0,0,0,0.4);
  }

  .mic-btn:hover   { transform: scale(1.05); }
  .mic-btn:active  { transform: scale(0.97); }

  .mic-btn.recording {
    background: linear-gradient(135deg, #b04040, #d45a5a);
    box-shadow: 0 6px 24px rgba(180,64,64,0.4), 0 2px 8px rgba(0,0,0,0.4);
    animation: recPulse 1s ease-in-out infinite;
  }

  @keyframes recPulse {
    0%, 100% { box-shadow: 0 6px 24px rgba(180,64,64,0.4); }
    50%       { box-shadow: 0 6px 40px rgba(180,64,64,0.7); }
  }

  .mic-icon { font-size: 26px; pointer-events: none; transition: transform 0.2s; }
  .mic-btn.recording .mic-icon { transform: scale(0.85); }

  /* Recording live waveform */
  .live-wave {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .live-wave.show { opacity: 1; }

  .live-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--leaf);
    height: 4px;
    transition: height 0.05s;
  }

  /* Diagnosis card */
  .diagnosis-card {
    background: var(--earth);
    border: 1px solid rgba(106,171,90,0.3);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 4px;
    max-width: 82%;
    animation: msgIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity: 0;
  }

  .diag-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .diag-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--sprout);
    background: rgba(106,171,90,0.15);
    border: 1px solid rgba(106,171,90,0.3);
    border-radius: 6px;
    padding: 3px 8px;
  }

  .diag-crop {
    font-size: 13px;
    color: rgba(245,239,224,0.6);
    font-weight: 300;
  }

  .diag-problem {
    font-size: 16px;
    font-weight: 500;
    color: var(--cream);
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .diag-confidence {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .conf-bar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .conf-fill {
    height: 100%;
    background: linear-gradient(to right, var(--moss), var(--sun));
    border-radius: 2px;
    transition: width 1s ease;
  }

  .conf-label {
    font-size: 11px;
    color: var(--sun);
    font-weight: 500;
    flex-shrink: 0;
  }

  .diag-remedy {
    font-size: 13px;
    color: rgba(245,239,224,0.75);
    line-height: 1.6;
    font-weight: 300;
  }

  /* Escalation notice */
  .escalation-card {
    background: rgba(180,120,40,0.1);
    border: 1px solid rgba(232,200,74,0.3);
    border-radius: var(--radius);
    padding: 14px 16px;
    max-width: 82%;
    animation: msgIn 0.4s forwards;
    opacity: 0;
  }

  .esc-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--sun);
    margin-bottom: 4px;
  }

  .esc-desc {
    font-size: 12px;
    color: rgba(245,239,224,0.5);
    font-weight: 300;
    line-height: 1.5;
  }

  /* Scrollbar for chat */
  .chat-area { scroll-behavior: smooth; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo-mark">🌾</div>
    <div class="header-text">
      <h1>KisanVoice</h1>
      <p>AI Crop Assistant</p>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('ml')">മല</button>
      <button class="lang-btn"        onclick="setLang('en')">EN</button>
    </div>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-orb"></div>
      <h2 id="emptyTitle">Speak about your crop</h2>
      <p id="emptyDesc">Hold the button below and describe what you're seeing — yellowing leaves, spots, wilting. I'll help diagnose the problem.</p>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="live-wave" id="liveWave">
    <div class="live-bar" id="lb1"></div>
    <div class="live-bar" id="lb2"></div>
    <div class="live-bar" id="lb3"></div>
    <div class="live-bar" id="lb4"></div>
    <div class="live-bar" id="lb5"></div>
    <div class="live-bar" id="lb6"></div>
    <div class="live-bar" id="lb7"></div>
  </div>
  <div class="status-pill" id="statusPill">Hold to speak</div>
  <div class="mic-wrap">
    <div class="mic-ring" id="ring1"></div>
    <div class="mic-ring" id="ring2"></div>
    <button class="mic-btn" id="micBtn"
      onmousedown="startRecording()"  onmouseup="stopRecording()"
      ontouchstart="startRecording()" ontouchend="stopRecording()">
      <span class="mic-icon">🎙</span>
    </button>
  </div>
</div>

<script>
const API = 'http://localhost:3000';
let lang = 'ml';
let sessionId = null;
let farmerId  = null;
let turnIndex = 0;
let mediaRec  = null;
let audioChunks = [];
let recStart  = null;
let waveInterval = null;
let isRecording = false;

const chatArea   = document.getElementById('chatArea');
const emptyState = document.getElementById('emptyState');
const micBtn     = document.getElementById('micBtn');
const statusPill = document.getElementById('statusPill');
const liveWave   = document.getElementById('liveWave');
const ring1      = document.getElementById('ring1');
const ring2      = document.getElementById('ring2');
const liveBars   = [1,2,3,4,5,6,7].map(i => document.getElementById('lb'+i));

const UI = {
  ml: {
    emptyTitle: 'നിങ്ങളുടെ വിളയെ കുറിച്ച് പറയൂ',
    emptyDesc:  'ചുവടെയുള്ള ബട്ടൺ അമർത്തി നിങ്ങൾ കാണുന്നത് വിവരിക്കൂ.',
    holdSpeak:  'സംസാരിക്കാൻ പിടിക്കൂ',
    recording:  'ശ്രവിക്കുന്നു...',
    processing: 'പ്രോസസ്സ് ചെയ്യുന്നു...',
    diagBadge:  'രോഗനിർണ്ണയം',
  },
  en: {
    emptyTitle: 'Speak about your crop',
    emptyDesc:  'Hold the button below and describe what you\'re seeing.',
    holdSpeak:  'Hold to speak',
    recording:  'Listening...',
    processing: 'Processing...',
    diagBadge:  'Diagnosis',
  }
};

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0 && l==='ml') || (i===1 && l==='en'))
  );
  document.getElementById('emptyTitle').textContent = UI[l].emptyTitle;
  document.getElementById('emptyDesc').textContent  = UI[l].emptyDesc;
  statusPill.textContent = UI[l].holdSpeak;
}

// ── Session init ──────────────────────────────────────────────
async function ensureSession() {
  if (sessionId) return;
  try {
    const res = await fetch(`${API}/session/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: 'web-' + Date.now(), language: lang })
    });
    const d = await res.json();
    sessionId = d.session.id;
    farmerId  = d.farmer.id;
  } catch(e) {
    console.warn('Session start failed (offline?):', e);
    sessionId = 'offline-' + Date.now();
    farmerId  = 'offline';
  }
}

// ── Recording ─────────────────────────────────────────────────
async function startRecording() {
  if (isRecording) return;
  isRecording = true;
  await ensureSession();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    recStart = Date.now();
    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => audioChunks.push(e.data);
    mediaRec.onstop = () => { stream.getTracks().forEach(t=>t.stop()); handleRecordingDone(); };
    mediaRec.start();
  } catch(e) {
    console.warn('Mic access denied:', e);
    isRecording = false;
    return;
  }

  // UI feedback
  micBtn.classList.add('recording');
  micBtn.querySelector('.mic-icon').textContent = '⏹';
  ring1.classList.add('pulse');
  ring2.classList.add('pulse');
  liveWave.classList.add('show');
  statusPill.textContent = UI[lang].recording;
  statusPill.classList.add('active');
  emptyState && (emptyState.style.display = 'none');

  waveInterval = setInterval(() => {
    liveBars.forEach(b => {
      b.style.height = (4 + Math.random() * 16) + 'px';
    });
  }, 80);
}

function stopRecording() {
  if (!isRecording || !mediaRec) return;
  isRecording = false;
  mediaRec.stop();

  micBtn.classList.remove('recording');
  micBtn.querySelector('.mic-icon').textContent = '🎙';
  ring1.classList.remove('pulse');
  ring2.classList.remove('pulse');
  liveWave.classList.remove('show');
  liveBars.forEach(b => b.style.height = '4px');
  clearInterval(waveInterval);
  statusPill.textContent = UI[lang].processing;
}

async function handleRecordingDone() {
  const duration = ((Date.now() - recStart) / 1000).toFixed(1)
  const blob     = new Blob(audioChunks, { type: 'audio/webm' })

  appendVoiceBubble('farmer', URL.createObjectURL(blob), duration, null)
  const typingEl = appendTyping()

  try {
    const form = new FormData()
    form.append('audio',      blob, 'recording.webm')
    form.append('session_id', sessionId)
    form.append('farmer_id',  farmerId)
    form.append('turn_index', turnIndex)
    form.append('language',   lang)

    const res = await fetch(`${API}/session/message`, { method: 'POST', body: form })
    const d   = await res.json()
    typingEl.remove()
    turnIndex += 2

    // Update farmer transcript
    const lastTranscript = chatArea.querySelector('.message.farmer:last-of-type .transcript-text')
    if (lastTranscript && d.transcript) lastTranscript.textContent = '"' + d.transcript + '"'

    // Decode base64 MP3 → playable Audio object
    let replyAudio = null
    if (d.reply_audio_b64) {
      const bytes  = Uint8Array.from(atob(d.reply_audio_b64), c => c.charCodeAt(0))
      const mp3    = new Blob([bytes], { type: 'audio/mp3' })
      replyAudio   = URL.createObjectURL(mp3)
      // Auto-play the AI response
      new Audio(replyAudio).play().catch(() => {})
    }

    if (d.escalated) {
      appendEscalation(d.reason)
    } else if (d.diagnosis) {
      appendVoiceBubble('ai', replyAudio, d.reply_duration, d.reply_text)
      appendDiagnosis(d.diagnosis)
    } else {
      appendVoiceBubble('ai', replyAudio, d.reply_duration, d.reply_text)
    }

  } catch (e) {
    typingEl.remove()
    appendVoiceBubble('ai', null, '0', 'Something went wrong. Please try again.')
    console.error(e)
  }

  statusPill.textContent = UI[lang].holdSpeak
  statusPill.classList.remove('active')
  scrollBottom()
}

// ── DOM helpers ───────────────────────────────────────────────
function appendVoiceBubble(role, audioUrl, duration, transcript) {
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  const bars = Array.from({length: 18}, (_,i) => {
    const h = 4 + Math.abs(Math.sin(i * 0.7 + Math.random())) * 18;
    return `<div class="wave-bar" style="height:${h}px"></div>`;
  }).join('');

  const audio = audioUrl ? new Audio(audioUrl) : null;
  let playing = false;

  wrap.innerHTML = `
    <div class="bubble voice-bubble">
      <button class="play-btn" title="Play">▶</button>
      <div class="waveform">${bars}</div>
      <span class="voice-duration">${duration}s</span>
    </div>
    ${transcript ? `<div class="transcript-text">"${transcript}"</div>` : '<div class="transcript-text"></div>'}
    <span class="msg-time">${now()}</span>
  `;

  const playBtn = wrap.querySelector('.play-btn');
  if (audio) {
    playBtn.onclick = () => {
      if (playing) { audio.pause(); audio.currentTime = 0; playBtn.textContent = '▶'; playing = false; }
      else         { audio.play(); playBtn.textContent = '⏸'; playing = true; }
    };
    audio.onended = () => { playBtn.textContent = '▶'; playing = false; };
  }

  chatArea.appendChild(wrap);
  scrollBottom();
  return wrap;
}

function appendTyping() {
  const el = document.createElement('div');
  el.className = 'typing-indicator';
  el.innerHTML = `
    <div class="ai-avatar">🌿</div>
    <div class="typing-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  chatArea.appendChild(el);
  scrollBottom();
  return el;
}

function appendDiagnosis(d) {
  const el = document.createElement('div');
  el.className = 'diagnosis-card';
  const pct = Math.round((d.confidence || 0.85) * 100);
  el.innerHTML = `
    <div class="diag-header">
      <span class="diag-badge">${UI[lang].diagBadge}</span>
      <span class="diag-crop">🌱 ${d.crop || 'Crop'}</span>
    </div>
    <div class="diag-problem">${d.problem || 'Issue identified'}</div>
    <div class="diag-confidence">
      <div class="conf-bar"><div class="conf-fill" style="width:0%" id="cfill"></div></div>
      <span class="conf-label">${pct}% confident</span>
    </div>
    <div class="diag-remedy">${d.remedy_text || ''}</div>
  `;
  chatArea.appendChild(el);
  scrollBottom();
  setTimeout(() => {
    const fill = el.querySelector('#cfill');
    if (fill) fill.style.width = pct + '%';
  }, 100);
}

function appendEscalation(reason) {
  const el = document.createElement('div');
  el.className = 'escalation-card';
  el.innerHTML = `
    <div class="esc-title">⚠ Connecting to expert</div>
    <div class="esc-desc">This case needs a specialist. An agricultural expert will contact you shortly.<br><small style="opacity:0.6">${reason||''}</small></div>
  `;
  chatArea.appendChild(el);
  scrollBottom();
}

function scrollBottom() {
  setTimeout(() => chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' }), 50);
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// Prevent context menu on long-press mobile
document.getElementById('micBtn').addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
